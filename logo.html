<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandaloop Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #logo-wrap {
    display: flex; flex-direction: column; align-items: center;
  }
  #drawing {
    width: 500px;
    height: 500px;
    display: block;
    object-fit: contain;
  }
  .logo-name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 48px;
    font-weight: 400;
    color: #FFD400;
    letter-spacing: 10px;
    text-indent: 10px;
    margin-top: -4px;
    text-shadow:
      0 0 20px rgba(255,212,0,0.6),
      0 0 60px rgba(255,212,0,0.25);
  }
</style>
</head>
<body>
<div id="logo-wrap">
  <img id="drawing" src="logo.png" alt="Mandaloop drawing">
  <div class="logo-name">MANDALOOP</div>
</div>
</body>
</html>
